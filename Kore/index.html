<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kore Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .launcher-card {
      max-width: 480px;
      padding: 1.5rem 1.75rem;
      border-radius: 16px;
      border: 1px solid #334155;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      box-shadow: 0 18px 45px rgba(15,23,42,0.9);
      text-align: center;
    }
    .launcher-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .launcher-card p {
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
      color: #9ca3af;
    }
    .launcher-card a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 1px solid #60a5fa;
      background: #0b1120;
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      margin: 5px; /* Added minor spacing so the new buttons do not touch */
    }
    .launcher-card a:hover {
      background: #1d2438;
      border-color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="launcher-card">
    <h1>Launching Kore…</h1>
    <p>If your browser does not automatically open Kore, use the button below.</p>
    <a href="Kore/index.html">Open Kore</a>
    
    <br><br>
    <a href="/.auth/login/aad">Work Log In</a>
    <a href="/.auth/logout">Sign Out</a>
    <br><br>
    <span id="user-greeting" style="color: #60a5fa; font-size: 0.9rem;"></span>
  </div>

  <script>
    async function fetchUserData() {
      try {
        const response = await fetch('/.auth/me');
        const payload = await response.json();
        
        if (payload.clientPrincipal) {
          const greetingElement = document.getElementById('user-greeting');
          if (greetingElement) {
            greetingElement.innerText = "Authenticated as: " + payload.clientPrincipal.userDetails;
          }
          // Save ID for Python database calls later
          sessionStorage.setItem('kore_user_id', payload.clientPrincipal.userId);
          
          // Auto-redirect to the main app AFTER successfully grabbing the identity
          setTimeout(() => {
            window.location.href = "Kore/index.html";
          }, 800);
        }
      } catch (error) {
        console.error("Auth check failed:", error);
      }
    }

    document.addEventListener('DOMContentLoaded', fetchUserData);
  </script>
</body>
</html>
