<script>
    let cloudIdentity = { userId: "local-dev", userName: "Local Developer" };
    let currentPageId = null;

    async function fetchSecureIdentity() {
        try {
            const response = await fetch('/.auth/me');
            const data = await response.json();
            if (data.clientPrincipal) {
                cloudIdentity.userId = data.clientPrincipal.userId;
                cloudIdentity.userName = data.clientPrincipal.userDetails;
            }
        } catch (error) {}
    }

    async function fetchPagesFromCloud() {
        try {
            const res = await fetch(`/api/get_info_pages?userId=${cloudIdentity.userId}`);
            if (res.ok) {
                const data = await res.json();
                if (Array.isArray(data)) return data;
            }
        } catch(e) {}
        
        // Fallback to local storage if API fails
        try {
            const raw = localStorage.getItem('infoPages');
            return raw ? JSON.parse(raw) : [];
        } catch(e) { return []; }
    }

    function escapeHtml(str) {
        return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function formatDate(iso) {
        if (!iso) return 'Unknown';
        try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await fetchSecureIdentity();
        
        const params = new URLSearchParams(window.location.search);
        currentPageId = params.get('id');

        const errorContainer = document.getElementById('errorContainer');
        const contentGrid = document.getElementById('contentGrid');

        if (!currentPageId) {
            errorContainer.style.display = 'block';
            return;
        }

        const pages = await fetchPagesFromCloud();
        const page = pages.find(p => p.id === currentPageId && !p.archived);

        if (!page) {
            errorContainer.style.display = 'block';
            return;
        }

        // Render Core Content
        contentGrid.style.display = 'grid';
        document.getElementById('viewTitle').innerHTML = page.titleHtml || escapeHtml(page.title) || 'Untitled Page';
        document.getElementById('viewSummary').innerHTML = page.summaryHtml || escapeHtml(page.summary || page.shortDesc || '');
        document.getElementById('viewContent').innerHTML = page.contentHtml || '';

        // Render Meta
        const statusClass = (page.status || 'draft').toLowerCase() === 'published' ? 'status-published' : 'status-draft';
        let metaHtml = `
            <li><span class="meta-label">Status</span><span class="status-badge ${statusClass}">${escapeHtml(page.status || 'Draft')}</span></li>
            <li><span class="meta-label">Author</span><span class="meta-value">${escapeHtml(page.author || 'Local User')}</span></li>
            <li><span class="meta-label">Last Updated</span><span class="meta-value">${formatDate(page.updatedAt || page.createdAt)}</span></li>
        `;

        if (page.tags && page.tags.length > 0) {
            const tagsHtml = page.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
            metaHtml += `<li><span class="meta-label">Tags</span><div class="tags-container">${tagsHtml}</div></li>`;
        }
        document.getElementById('viewMeta').innerHTML = metaHtml;

        // Render Images
        if (page.images && page.images.length > 0) {
            document.getElementById('imagesSection').style.display = 'block';
            const imgContainer = document.getElementById('viewImages');
            page.images.forEach(img => {
                if (img.dataUrl) {
                    const div = document.createElement('div');
                    div.className = 'attachment-item';
                    div.innerHTML = `<img src="${img.dataUrl}" alt="Attached Image"><div class="attachment-caption">${escapeHtml(img.caption || '')}</div>`;
                    imgContainer.appendChild(div);
                }
            });
        }

        // Render Links
        if (page.links && page.links.length > 0) {
            document.getElementById('linksSection').style.display = 'block';
            const linkContainer = document.getElementById('viewLinks');
            page.links.forEach(lnk => {
                if (lnk.url) {
                    const a = document.createElement('a');
                    a.href = lnk.url;
                    a.target = '_blank';
                    a.className = 'link-item';
                    a.textContent = lnk.label || lnk.url;
                    linkContainer.appendChild(a);
                }
            });
        }

        // Actions
        document.getElementById('editPageBtn').addEventListener('click', () => {
            window.location.href = `create-page.html?id=${encodeURIComponent(page.id)}`;
        });

        document.getElementById('archivePageBtn').addEventListener('click', async () => {
            if (confirm('Archive this page? It will be removed from the main Info Hub.')) {
                page.archived = true;
                try {
                    await fetch('/api/save_info_page', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(page)
                    });
                } catch(e) {}
                window.location.href = 'info-hub.html';
            }
        });
    });
</script>
