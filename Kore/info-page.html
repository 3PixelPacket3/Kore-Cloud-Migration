<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Navigation -->
  

  <main class="centered">
    <section class="card infohub-view" id="infoPageView">
      <header class="infohub-view-header">
        <h2 id="viewTitle">Loading...</h2>
        <div class="infohub-view-actions">
          <button type="button" id="editPageBtn" class="secondary-btn">Edit</button>
          <button type="button" id="archivePageBtn" class="danger-btn">Delete</button>
          <button type="button" id="backToInfoHubBtn" class="secondary-btn">Back to Info Hub</button>
        </div>
      </header>

      <p id="viewSummary" class="infohub-view-summary"></p>

      <div id="viewContent" class="infohub-view-content"></div>

      <section class="infohub-view-section">
        <h3>Supporting Images</h3>
        <div id="viewImages" class="infohub-image-list"></div>
      </section>

      <section class="infohub-view-section">
        <h3>Supporting Links</h3>
        <div id="viewLinks" class="infohub-link-list"></div>
      </section>

      <section class="infohub-view-section">
        <h3>Details</h3>
        <div id="viewMeta" class="infohub-meta"></div>
      </section>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Kore <span class="footer-version">v3.14.8</span></p>
    <p class="footer-meta">Created by Joshua M. Smolak with AI-assisted tooling.</p>
  </footer>

  <link rel="stylesheet" href="css/ai.css">
  <script src="js/version.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/backup.js"></script>
  <script src="data/kore_kb.js"></script>
  <script src="js/info-hub.js"></script>
  <script src="js/ai.js"></script>

  <!-- Ask Kore Widget -->
  <div id="ai-widget">
    <button id="chat-btn">Ask Kore</button>
    <div id="chat-box" style="display:none;">
      <div class="ai-header">
        <span class="ai-header-title">Ask Kore</span>
        <button type="button" id="chat-close" class="ai-close" aria-label="Close">×</button>
      </div>
      <div class="ai-controls">
        <label for="askScope" class="ai-scope-label">Scope:</label>
        <select id="askScope" class="ai-scope-select">
          <option value="all" selected>Everything</option>
          <option value="kb">Help &amp; Core Pages</option>
          <option value="info">Info Hub Guides</option>
        </select>
      </div>
      <div id="chat-output"></div>
      <input type="text" id="chat-input" placeholder="Ask Kore..."/>
    </div>
  </div>
</body>
</html>
