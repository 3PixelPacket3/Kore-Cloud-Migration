<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kore | Application Directory</title>
    <style>
        /* Premium Light Theme Variables */
        :root {
            --accent-primary: #0ea5e9;
            --accent-hover: #0284c7;
            --bg-app: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-secondary: #475569;
            --border-subtle: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05);
            --shadow-hover: 0 10px 15px -3px rgba(15, 23, 42, 0.08);
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body {
            margin: 0; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-app); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; min-width: 1024px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header (With Search) --- */
        .global-header { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; box-shadow: var(--shadow-sm); flex-shrink: 0; position: sticky; top: 0; z-index: 100;}
        .header-left { display: flex; align-items: center; gap: 40px; height: 100%; }
        .kore-logo { font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; margin: 0; display: flex; align-items: center; gap: 8px; }
        .kore-logo span { color: var(--accent-primary); }
        .nav-menu { display: flex; gap: 8px; height: 100%; }
        .nav-item { text-decoration: none; color: var(--text-secondary); padding: 0 16px; display: flex; align-items: center; height: 100%; font-weight: 500; font-size: 0.95rem; border-bottom: 3px solid transparent; transition: all 0.2s ease; cursor: pointer; position: relative; }
        .nav-item:hover, .nav-item.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background-color: #f0f9ff; }
        .dropdown-content { display: none; position: absolute; top: 64px; left: 0; background-color: var(--bg-surface); min-width: 260px; box-shadow: var(--shadow-md); border: 1px solid var(--border-subtle); border-radius: 0 0 var(--radius-sm) var(--radius-sm); overflow: hidden; z-index: 101; }
        .nav-item:hover .dropdown-content { display: block; }
        .dropdown-content a { color: var(--text-secondary); padding: 14px 20px; text-decoration: none; display: block; border-bottom: 1px solid var(--bg-app); font-weight: 500; }
        .dropdown-content a:hover { background-color: #f0f9ff; color: var(--accent-primary); padding-left: 24px; transition: all 0.2s ease; }
        .user-badge { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); background: var(--bg-app); padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border-subtle); margin-left: auto; margin-right: 24px;}

        /* Global Search Infrastructure */
        .search-container { display: flex; align-items: center; position: relative; }
        .search-bar { padding: 10px 16px 10px 36px; border: 1px solid var(--border-subtle); border-radius: 99px; width: 260px; background-color: var(--bg-app); font-size: 0.9rem; outline: none; transition: width 0.3s ease; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'); background-repeat: no-repeat; background-position: 12px center; }
        .search-bar:focus { width: 340px; border-color: var(--accent-primary); background-color: var(--bg-surface); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .search-dropdown { display: none; position: absolute; top: 50px; right: 0; width: 340px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-md); z-index: 1000; max-height: 400px; overflow-y: auto; }
        .search-group-title { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; padding: 12px 16px 4px 16px; letter-spacing: 0.5px; }
        .search-item { display: block; padding: 10px 16px; text-decoration: none; color: var(--text-main); border-left: 3px solid transparent; }
        .search-item:hover { background: #f0f9ff; border-left-color: var(--accent-primary); }
        .search-item-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
        .search-item-sub { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Main Content --- */
        .main-container { padding: 40px 32px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; flex-grow: 1; }
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px; margin-bottom: 30px; }
        .page-title { margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-main); }
        .btn-add { background-color: var(--accent-primary); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background-color: var(--accent-hover); }

        /* Application Grid & Cards */
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
        
        .app-wrapper { position: relative; display: block; }
        
        .app-card {
            background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
            padding: 24px 24px 16px 24px; text-align: center; box-shadow: var(--shadow-sm);
            transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--text-main); height: 100%; box-sizing: border-box;
        }
        
        .app-wrapper:hover .app-card { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent-primary); }
        
        /* Action Buttons (Delete Only) */
        .app-actions {
            position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s ease; z-index: 10; pointer-events: none;
        }
        .app-wrapper:hover .app-actions { opacity: 1; pointer-events: auto; transform: translateY(-4px); }
        
        .action-btn {
            background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 6px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.9rem; color: var(--text-secondary); transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
        .action-btn.delete:hover { color: #ef4444; border-color: #ef4444; background: #fef2f2; }

        .app-icon-container { width: 56px; height: 56px; margin-bottom: 16px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: #f0f9ff; }
        .app-icon-img { width: 100%; height: 100%; object-fit: cover; }
        .app-icon-text { font-size: 1.8rem; font-weight: bold; color: var(--accent-primary); }
        .app-name { margin: 0; font-weight: 600; font-size: 1.05rem; }
        .app-url { margin: 8px 0 0 0; font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: #fff; padding: 32px; border-radius: 12px; width: 400px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; outline: none; width: 100%; box-sizing: border-box; }
        .modal-input:focus { border-color: var(--accent-primary); }

        /* --- Global Footer --- */
        .global-footer { background-color: var(--bg-surface); border-top: 1px solid var(--border-subtle); padding: 24px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; flex-shrink: 0; font-weight: 500; }
    </style>
</head>
<body>

    <header class="global-header">
        <div class="header-left">
            <h1 class="kore-logo">Kore<span>.</span></h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                <div class="nav-item active">Operations ▼
                    <div class="dropdown-content">
                        <a href="apps.html">Apps</a>
                        <a href="work.html">Work Tracker</a>
                        <a href="passwords.html">Password Generator</a>
                        <a href="product-html.html">Product HTML Converter</a>
                        <a href="nebula.html">Nebula HTML Forge</a>
                        <a href="lod.html">LOD Validation Tool</a>
                    </div>
                </div>
                <div class="nav-item">Resources ▼
                    <div class="dropdown-content">
                        <a href="info-hub.html">Info Hub</a>
                        <a href="reports.html">Data/Reports</a>
                    </div>
                </div>
                <a href="about.html" class="nav-item">About</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>
        </div>
        
        <div id="userIdentityBadge" class="user-badge">Authenticating...</div>

        <div class="search-container">
            <input type="text" id="globalSearchInput" class="search-bar" placeholder="Search Apps, Guides, Tickets...">
            <div id="globalSearchDropdown" class="search-dropdown"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="page-header">
            <h2 class="page-title">Personal Application Directory</h2>
            <button class="btn-add" onclick="openModal()">+ Add Application</button>
        </div>
        <div class="apps-grid" id="apps-container"></div>
    </main>

    <footer class="global-footer">&copy; 2026 Kore | Enterprise Cloud Vault Connected.</footer>

    <div id="app-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin:0; font-size:1.4rem; color:#0f172a;">New Shortcut</h3>
            <input type="text" id="appName" class="modal-input" placeholder="Application Name (Required)">
            <input type="url" id="appUrl" class="modal-input" placeholder="Link URL (Required)">
            <input type="url" id="appIconUrl" class="modal-input" placeholder="Image/Icon URL (.png, .jpg - Optional)">
            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:10px;">
                <button onclick="closeModal()" style="padding:10px 20px; background:transparent; border:1px solid #e2e8f0; border-radius:8px; cursor:pointer; font-weight:600; color:#475569;">Cancel</button>
                <button onclick="saveApp()" style="padding:10px 20px; background:var(--accent-primary); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Save App</button>
            </div>
        </div>
    </div>

    <script>
        // --- Microsoft Entra ID Integration ---
        let cloudIdentity = { userId: "local-dev", userName: "Local Developer" };
        let STORAGE_KEY_APPS = 'kore_custom_apps_local';

        async function fetchSecureIdentity() {
            try {
                const response = await fetch('/.auth/me');
                const data = await response.json();
                if (data.clientPrincipal) {
                    cloudIdentity.userId = data.clientPrincipal.userId;
                    cloudIdentity.userName = data.clientPrincipal.userDetails;
                    document.getElementById('userIdentityBadge').innerText = `👤 ${cloudIdentity.userName}`;
                    STORAGE_KEY_APPS = `kore_custom_apps_${cloudIdentity.userId}`;
                } else {
                    document.getElementById('userIdentityBadge').innerText = "Running Locally (Unauthenticated)";
                }
            } catch (error) {
                console.log("Auth fetch bypassed - Local execution.");
                document.getElementById('userIdentityBadge').innerText = "System Admin Offline Mode";
            }
        }

        // --- Global Search Integration ---
        (function initGlobalSearch() {
            const searchInput = document.getElementById('globalSearchInput');
            const searchDropdown = document.getElementById('globalSearchDropdown');
            if (!searchInput || !searchDropdown) return;

            document.addEventListener('click', e => {
                if (!e.target.closest('.search-container')) searchDropdown.style.display = 'none';
            });

            searchInput.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase();
                if (query.length < 2) { searchDropdown.style.display = 'none'; return; }
                let resultsHtml = ''; let hasResults = false;

                const apps = getApps();
                const matchedApps = apps.filter(a => String(a.name).toLowerCase().includes(query) || String(a.url).toLowerCase().includes(query));
                if (matchedApps.length > 0) {
                    hasResults = true; resultsHtml += `<div class="search-group-title">Applications</div>`;
                    matchedApps.forEach(app => resultsHtml += `<a href="${app.url}" class="search-item" target="_blank"><div class="search-item-title">${app.name}</div><div class="search-item-sub">${app.url}</div></a>`);
                }

                const guides = JSON.parse(localStorage.getItem('infoPages')) || [];
                const matchedGuides = guides.filter(g => !g.archived && (String(g.title).toLowerCase().includes(query) || String(g.summary).toLowerCase().includes(query)));
                if (matchedGuides.length > 0) {
                    hasResults = true; resultsHtml += `<div class="search-group-title">Info Hub Guides</div>`;
                    matchedGuides.forEach(g => resultsHtml += `<a href="info-page.html?id=${encodeURIComponent(g.id)}" class="search-item"><div class="search-item-title">${g.title || 'Untitled'}</div><div class="search-item-sub">${g.summary || 'Documentation'}</div></a>`);
                }

                searchDropdown.innerHTML = hasResults ? resultsHtml : `<div style="padding: 16px; color: var(--text-secondary); font-size: 0.9rem; text-align: center;">No local results found.</div>`;
                searchDropdown.style.display = 'block';
            });
        })();

        // --- App Directory Logic ---
        function getApps() {
            let apps = JSON.parse(localStorage.getItem(STORAGE_KEY_APPS));
            if (!apps || apps.length === 0) {
                apps = [
                    { id: 'app_1', name: "BradyPLUS Portal", url: "https://www.bradyplus.com", iconUrl: "" },
                    { id: 'app_2', name: "SharePoint Core", url: "https://starkindustries.sharepoint.com", iconUrl: "" }
                ];
            }
            return apps;
        }

        function loadApps() {
            const apps = getApps();
            const container = document.getElementById('apps-container');
            container.innerHTML = ''; 

            if (apps.length === 0) {
                container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 40px;">No applications added to your personal directory yet.</div>';
                return;
            }

            apps.forEach(app => {
                let iconHtml = app.iconUrl 
                    ? `<img src="${app.iconUrl}" class="app-icon-img" alt="${app.name} icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"> <span class="app-icon-text" style="display:none;">${app.name.charAt(0).toUpperCase()}</span>` 
                    : `<span class="app-icon-text">${app.name.charAt(0).toUpperCase()}</span>`;

                container.innerHTML += `
                    <div class="app-wrapper">
                        <div class="app-actions">
                            <button class="action-btn delete" onclick="event.preventDefault(); event.stopPropagation(); deleteApp('${app.id}')" title="Delete Shortcut">🗑️</button>
                        </div>
                        <a href="${app.url}" target="_blank" class="app-card">
                            <div class="app-icon-container">${iconHtml}</div>
                            <h4 class="app-name">${app.name}</h4>
                            <p class="app-url">${app.url.replace(/^https?:\/\//, '')}</p>
                        </a>
                    </div>
                `;
            });
        }

        function openModal() {
            document.getElementById('appName').value = "";
            document.getElementById('appUrl').value = "";
            document.getElementById('appIconUrl').value = "";
            document.getElementById('app-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('app-modal').style.display = 'none';
        }

        function saveApp() {
            const nameInput = document.getElementById('appName').value.trim();
            let urlInput = document.getElementById('appUrl').value.trim();
            const iconInput = document.getElementById('appIconUrl').value.trim();

            if (!nameInput || !urlInput) return alert('Name and URL are required.');
            if (!urlInput.startsWith('http://') && !urlInput.startsWith('https://')) {
                urlInput = 'https://' + urlInput;
            }

            let apps = getApps();
            const newApp = { id: 'app_' + Date.now(), name: nameInput, url: urlInput, iconUrl: iconInput };
            apps.push(newApp);

            localStorage.setItem(STORAGE_KEY_APPS, JSON.stringify(apps));
            closeModal();
            loadApps();
        }

        function deleteApp(id) {
            if(confirm("Are you sure you want to remove this application shortcut from your directory?")) {
                let apps = getApps();
                apps = apps.filter(a => a.id !== id);
                localStorage.setItem(STORAGE_KEY_APPS, JSON.stringify(apps));
                loadApps();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchSecureIdentity();
            loadApps();
        });
    </script>
</body>
</html>
