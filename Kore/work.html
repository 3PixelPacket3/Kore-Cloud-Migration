<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kore | Work Tracker</title>
    <style>
        /* Premium Light Theme Variables */
        :root {
            --accent-primary: #0ea5e9;
            --accent-hover: #0284c7;
            --bg-app: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-secondary: #475569;
            --border-subtle: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05);
            --radius-md: 12px;
            --radius-sm: 8px;
            --success: #10b981;
        }

        body {
            margin: 0; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-app); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh; min-width: 1024px;
        }

        /* --- Global Header --- */
        .global-header { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; box-shadow: var(--shadow-sm); flex-shrink: 0; position: sticky; top: 0; z-index: 100;}
        .header-left { display: flex; align-items: center; gap: 40px; height: 100%; }
        .kore-logo { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin: 0; display: flex; gap: 8px; }
        .kore-logo span { color: var(--accent-primary); }
        .nav-menu { display: flex; gap: 8px; height: 100%; }
        .nav-item { text-decoration: none; color: var(--text-secondary); padding: 0 16px; display: flex; align-items: center; height: 100%; font-weight: 500; font-size: 0.95rem; border-bottom: 3px solid transparent; cursor: pointer; position: relative; }
        .nav-item:hover, .nav-item.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background-color: #f0f9ff; }
        
        .user-badge { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); background: var(--bg-app); padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border-subtle); }

        /* --- Main Content --- */
        .main-container { padding: 40px 32px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; flex-grow: 1; }

        /* Banner System */
        .hero-banner { background: var(--bg-surface); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); height: 200px; position: relative; margin-bottom: 24px; }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(15,23,42,0.9), transparent); padding: 30px; box-sizing: border-box; color: white; }
        .hero-title { margin: 0; font-size: 1.8rem; font-weight: 700; }

        /* Buttons & Inputs */
        .btn { background-color: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 10px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn:hover { background-color: var(--bg-app); border-color: var(--text-secondary); }
        .btn-primary { background-color: var(--accent-primary); color: white; border: none; }
        .btn-primary:hover { background-color: var(--accent-hover); border: none; }
        
        select, input[type="text"], input[type="date"] { padding: 10px 12px; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; background: var(--bg-surface); color: var(--text-main); font-family: inherit; width: 100%; box-sizing: border-box; }
        select:focus, input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }

        /* --- View 1: Dashboard --- */
        .toolbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; background: var(--bg-surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
        .filters-group { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .filter-item { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        .actions-group { display: flex; gap: 12px; }

        /* Data Table */
        .table-container { background: var(--bg-surface); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: var(--bg-app); padding: 16px; font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; border-bottom: 2px solid var(--border-subtle); cursor: pointer; }
        td { padding: 16px; border-bottom: 1px solid var(--border-subtle); font-size: 0.95rem; vertical-align: middle; }
        tr:hover td { background-color: #f8fafc; cursor: pointer; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 700; display: inline-block; }
        
        .progress-pill { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px;}

        /* --- View 2: Form --- */
        #view-form { display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; background: var(--bg-surface); padding: 32px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 3; }
        .form-label { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        
        /* Checklist System */
        .task-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .task-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-app); padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
        .task-item-left { display: flex; align-items: center; gap: 12px; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--text-secondary); opacity: 0.7; }
        .task-text { font-size: 0.9rem; font-weight: 500; }
        .delete-task-btn { background: transparent; border: none; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 1rem; }

        .editor-container { border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); overflow: hidden; }
        .editor-toolbar { background: var(--bg-app); border-bottom: 1px solid var(--border-subtle); padding: 8px; display: flex; gap: 8px; }
        .editor-btn { background: transparent; border: 1px solid transparent; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; color: var(--text-secondary); transition: all 0.2s; }
        .editor-btn:hover { background: #e2e8f0; color: var(--text-main); }
        .editor-content { min-height: 250px; padding: 16px; background: var(--bg-surface); outline: none; font-size: 0.95rem; line-height: 1.6; }
        .form-actions { display: flex; justify-content: flex-end; gap: 16px; }

        .global-footer { background-color: var(--bg-surface); border-top: 1px solid var(--border-subtle); padding: 24px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; flex-shrink: 0; font-weight: 500; }
    </style>
</head>
<body>

    <header class="global-header">
        <div class="header-left">
            <h1 class="kore-logo">Kore<span>.</span></h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="work.html" class="nav-item active">Work Tracker</a>
                <a href="settings.html" class="nav-item">Settings</a>
            </nav>
        </div>
        <div id="userIdentityBadge" class="user-badge">Authenticating...</div>
    </header>

    <main class="main-container">
        
        <div id="view-dashboard">
            <section class="hero-banner">
                <img src="images/WorkTrackerBanner.jpg" alt="Work Tracker" onerror="this.src=''; this.style.backgroundColor='#0ea5e9';">
                <div class="hero-overlay"><h2 class="hero-title">Work Tracker Enterprise</h2></div>
            </section>

            <div class="toolbar">
                <div class="filters-group">
                    <div class="filter-item">
                        <label>Status Filter</label>
                        <select id="filterStatus" onchange="renderTable()">
                            <option value="Active" selected>Active Tasks</option>
                            <option value="All">All Statuses</option>
                            <option value="Open">Open</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Priority</label>
                        <select id="filterPriority" onchange="renderTable()">
                            <option value="All">All Priorities</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="actions-group">
                    <button class="btn btn-primary" onclick="openForm()">➕ Add Request</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Progress</th>
                            <th>Due Date</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-form">
            <section class="hero-banner" style="height: 120px;">
                <div class="hero-overlay"><h2 class="hero-title" id="form-title">New Request</h2></div>
            </section>

            <input type="hidden" id="ticketId">
            <input type="hidden" id="createdDate">

            <div class="form-grid">
                <div class="form-group full-width">
                    <label class="form-label">Title</label>
                    <input type="text" id="reqTitle" placeholder="Brief description of the request...">
                </div>

                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input type="date" id="reqDue">
                </div>

                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="reqStatus">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="On Hold">On Hold</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select id="reqPriority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <div class="form-group full-width" style="margin-top: 12px; padding-top: 24px; border-top: 1px solid var(--border-subtle);">
                    <label class="form-label" style="font-size: 1.1rem; color: var(--accent-primary);">Sub-Tasks / Checklist</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <input type="text" id="newTaskInput" placeholder="Add a new checklist item...">
                        <button class="btn" type="button" onclick="addChecklistItem()">Add Task</button>
                    </div>
                    <div id="checklistContainer" class="task-list"></div>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Notes & Details</label>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button class="editor-btn" type="button" onclick="formatDoc('bold')">B</button>
                            <button class="editor-btn" type="button" onclick="formatDoc('italic')" style="font-style:italic;">I</button>
                            <button class="editor-btn" type="button" onclick="formatDoc('insertUnorderedList')">• List</button>
                        </div>
                        <div id="reqNotes" class="editor-content" contenteditable="true"></div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn" onclick="closeForm()">Cancel</button>
                <button class="btn btn-primary" onclick="saveRequest()" id="saveBtn">Save & Transmit to Cloud</button>
            </div>
        </div>

    </main>

    <script>
        // --- 1. Microsoft Entra ID Authentication ---
        let cloudIdentity = { userId: "local-dev", userName: "Local Developer" };
        let activeChecklist = [];

        async function fetchSecureIdentity() {
            try {
                const response = await fetch('/.auth/me');
                const data = await response.json();
                if (data.clientPrincipal) {
                    cloudIdentity.userId = data.clientPrincipal.userId;
                    cloudIdentity.userName = data.clientPrincipal.userDetails;
                    document.getElementById('userIdentityBadge').innerText = `👤 ${cloudIdentity.userName}`;
                } else {
                    document.getElementById('userIdentityBadge').innerText = "Running Locally (Unauthenticated)";
                }
            } catch (error) {
                console.log("Auth fetch bypassed - Local execution.");
                document.getElementById('userIdentityBadge').innerText = "System Admin Offline Mode";
            }
        }

        // --- 2. Database & State Management ---
        function getWorkItems() { return JSON.parse(localStorage.getItem('kore_work_items')) || []; }

        function getStatusColor(status) {
            switch(status) {
                case 'Open': return 'background:#eff6ff; color:#3b82f6; border:1px solid #bfdbfe;';
                case 'In Progress': return 'background:#fffbeb; color:#d97706; border:1px solid #fde68a;';
                case 'Completed': return 'background:#ecfdf5; color:#10b981; border:1px solid #a7f3d0;';
                default: return 'background:#f1f5f9; color:#64748b;';
            }
        }

        function generateUniqueTicketId() {
            return "TKT-" + Math.floor(10000 + Math.random() * 90000);
        }

        // --- 3. UI Rendering ---
        function renderTable() {
            const items = getWorkItems();
            const tbody = document.getElementById('tracker-body');
            tbody.innerHTML = '';

            const fStatus = document.getElementById('filterStatus').value;
            const fPriority = document.getElementById('filterPriority').value;

            const filtered = items.filter(item => {
                let statusMatch = (fStatus === 'All') || 
                                  (fStatus === 'Active' && (item.status === 'Open' || item.status === 'In Progress')) || 
                                  (item.status === fStatus);
                let prioMatch = (fPriority === 'All' || item.priority === fPriority);
                return statusMatch && prioMatch && !item.archived && !item.deleted;
            });

            filtered.sort((a, b) => new Date(b.created) - new Date(a.created));

            filtered.forEach(item => {
                // Checklist progress calculation
                let progressBadge = '--';
                if (item.tasks && item.tasks.length > 0) {
                    const completed = item.tasks.filter(t => t.done).length;
                    progressBadge = `<span class="progress-pill">✅ ${completed} / ${item.tasks.length}</span>`;
                }

                tbody.innerHTML += `
                    <tr onclick="openForm('${item.id}')">
                        <td style="font-family:monospace; color:#64748b; font-weight:600;">${item.id}</td>
                        <td style="font-weight:600; color:#0f172a;">${item.title}</td>
                        <td style="font-weight:600;">${item.priority}</td>
                        <td><span class="status-badge" style="${getStatusColor(item.status)}">${item.status}</span></td>
                        <td>${progressBadge}</td>
                        <td>${item.dueDate ? new Date(item.dueDate).toLocaleDateString() : '--'}</td>
                    </tr>
                `;
            });
        }

        // --- 4. Checklist System ---
        function renderChecklist() {
            const container = document.getElementById('checklistContainer');
            container.innerHTML = '';
            
            activeChecklist.forEach((task, index) => {
                container.innerHTML += `
                    <div class="task-item ${task.done ? 'done' : ''}">
                        <div class="task-item-left">
                            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleChecklistItem(${index})">
                            <span class="task-text">${task.text}</span>
                        </div>
                        <button class="delete-task-btn" onclick="removeChecklistItem(${index})">&times;</button>
                    </div>
                `;
            });
        }

        window.addChecklistItem = function() {
            const input = document.getElementById('newTaskInput');
            if (input.value.trim() !== '') {
                activeChecklist.push({ text: input.value.trim(), done: false });
                input.value = '';
                renderChecklist();
            }
        };

        window.toggleChecklistItem = function(index) {
            activeChecklist[index].done = !activeChecklist[index].done;
            renderChecklist();
        };

        window.removeChecklistItem = function(index) {
            activeChecklist.splice(index, 1);
            renderChecklist();
        };

        // --- 5. Form Management & Azure Transmission ---
        function openForm(id = null) {
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-form').style.display = 'block';

            if (id) {
                const items = getWorkItems();
                const item = items.find(i => i.id === id);
                document.getElementById('form-title').innerText = "Edit Request: " + id;
                document.getElementById('ticketId').value = item.id;
                document.getElementById('createdDate').value = item.created;
                document.getElementById('reqTitle').value = item.title;
                document.getElementById('reqDue').value = item.dueDate || "";
                document.getElementById('reqStatus').value = item.status;
                document.getElementById('reqPriority').value = item.priority;
                document.getElementById('reqNotes').innerHTML = item.notes || "";
                activeChecklist = item.tasks || [];
            } else {
                document.getElementById('form-title').innerText = "New Request";
                document.getElementById('ticketId').value = "";
                document.getElementById('createdDate').value = new Date().toISOString();
                document.getElementById('reqTitle').value = "";
                document.getElementById('reqDue').value = "";
                document.getElementById('reqStatus').value = "Open";
                document.getElementById('reqPriority').value = "Medium";
                document.getElementById('reqNotes').innerHTML = "";
                activeChecklist = [];
            }
            renderChecklist();
        }

        function closeForm() {
            document.getElementById('view-form').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'block';
            renderTable();
        }

        async function saveRequest() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Transmitting..."; btn.disabled = true;

            const title = document.getElementById('reqTitle').value.trim();
            if (!title) { alert('Title is required.'); btn.innerText = "Save & Transmit to Cloud"; btn.disabled = false; return; }

            const idInput = document.getElementById('ticketId').value || generateUniqueTicketId();
            
            // Package the Azure Payload
            const payload = {
                id: idInput,
                created: document.getElementById('createdDate').value,
                title: title,
                dueDate: document.getElementById('reqDue').value,
                status: document.getElementById('reqStatus').value,
                priority: document.getElementById('reqPriority').value,
                notes: document.getElementById('reqNotes').innerHTML,
                tasks: activeChecklist,
                authorId: cloudIdentity.userId,
                authorEmail: cloudIdentity.userName
            };

            // 1. Transmit to Azure Cloud Database
            try {
                const response = await fetch('/api/save_work_item', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) console.warn("Cloud transmit pending (Backend may still be compiling).");
            } catch (err) {
                console.error("Cloud link offline. Caching locally.", err);
            }

            // 2. Save to Local Memory immediately for seamless UI
            let items = getWorkItems();
            const idx = items.findIndex(i => i.id === payload.id);
            if (idx > -1) { items[idx] = payload; } else { items.push(payload); }
            localStorage.setItem('kore_work_items', JSON.stringify(items));

            btn.innerText = "Save & Transmit to Cloud"; btn.disabled = false;
            closeForm();
        }

        function formatDoc(cmd) { document.execCommand(cmd, false, null); document.getElementById('reqNotes').focus(); }

        document.addEventListener('DOMContentLoaded', () => {
            fetchSecureIdentity();
            renderTable();
        });
    </script>
</body>
</html>
